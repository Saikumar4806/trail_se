<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/Admin/admin.css">
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Admin Dashboard</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn" onclick="history.back()">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h3>System Overview</h3>
      <p id="dashboardMessage">Loading data...</p>
      <ul>
        <li>Total Users: <strong id="statUsers">0</strong></li>
        <li>Active Delivery Partners: <strong id="statPartners">0</strong></li>
        <li>Today's Orders: <strong id="statOrders">0</strong></li>
      </ul>
    </div>

    <div class="card">
      <h3>Admin Features</h3>
      <div class="feature-grid">
        <div class="feature-item">
          <h4>Manage Items</h4>
          <p>Manage subscription items, adjust prices, edit details, or remove products from the delivery network.</p>
          <button class="btn-primary" onclick="window.location.href='items.html'" style="margin-top: 10px;">Go to Items</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/admin/dashboard.js"></script>
</body>
</html>
