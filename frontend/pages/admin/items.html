<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Items - Admin</title>
  <link rel="stylesheet" href="../../assets/css/Admin/items.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Manage Inventory Items</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn" onclick="history.back()">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="item-management-container">
        <!-- Add Item Form -->
        <div class="item-form-section">
          <h4>Add New Item</h4>
          <form id="itemForm" class="admin-form" enctype="multipart/form-data">
            <input type="hidden" id="itemId">
            <div class="form-group">
              <label for="itemName">Item Name</label>
              <input type="text" id="itemName" required>
            </div>
            <div class="form-group">
              <label for="itemPrice">Price</label>
              <input type="number" id="itemPrice" step="0.01" required>
            </div>
            <div class="form-group">
              <label>Per Unit</label>
              <div class="unit-input-group">
                <input type="number" id="itemUnitValue" min="0" step="0.01" placeholder="e.g. 50" required>
                <select id="itemUnitType" required>
                  <option value="">Select unit</option>
                  <option value="grams">grams</option>
                  
                  <option value="ml">ml</option>
                  <option value="liter">liter</option>
                  <option value="piece">piece</option>
                  <option value="pack">pack</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="itemCategory">Category</label>
              <select id="itemCategory" required>
                <option value="">Select a category</option>
                <option value="fruits">Fruits</option>
                <option value="vegetables">Vegetables</option>
                <option value="dairy">Dairy</option>
                <option value="nuts">Nuts</option>
              </select>
            </div>
            <div class="form-group">
              <label for="itemQuantity">Quantity</label>
              <div class="unit-input-group">
                <input type="number" id="itemQuantity" value="0" min="0" required>
                <select id="itemQuantityUnit" required>
                  <option value="">Select quantity unit</option>
                  <option value="grams">grams</option>
                  <option value="kg">kg</option>
                  <option value="ml">ml</option>
                  <option value="liter">liter</option>
                  <option value="piece">piece</option>
                  <option value="pack">pack</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="itemImage">Item Image (optional)</label>
              <input type="file" id="itemImage" accept="image/*">
              <small class="field-help">Upload JPG, PNG, WEBP, or GIF (max 5MB).</small>
              <div id="currentImageWrap" class="current-image-wrap" style="display: none;">
                <span>Current image:</span>
                <a id="currentImageLink" href="#" target="_blank" rel="noopener noreferrer">View image</a>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" id="saveItemBtn" class="btn-primary">Save Item</button>
              <button type="button" id="cancelEditBtn" class="btn-secondary" style="display: none;">Cancel</button>
            </div>
          </form>
          <div id="itemFormMessage" class="form-message"></div>
        </div>

        <!-- Items Table -->
        <div class="items-list-section">
          <h4>Items List</h4>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price(RS)</th>
                  <th>Unit</th>
                  <th>Quantity</th>
                  <th>Quantity Unit</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="itemsTableBody">
                <tr><td colspan="8" class="text-center">Loading items...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/admin/items.js"></script>
</body>
</html>
