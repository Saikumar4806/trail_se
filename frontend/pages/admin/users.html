<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Customers - Admin</title>
  <link rel="stylesheet" href="../../assets/css/Admin/users.css">
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Manage Customers</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn" onclick="history.back()">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="management-container">
        <!-- Users Table -->
        <div class="list-section">
          <h4>Customers List</h4>
          <div class="filter-options">
            <label for="filterStatus">Filter by Status:</label>
            <select id="filterStatus">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="blocked">Blocked</option>
            </select>
          </div>
          <div id="usersMessage" class="form-message"></div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="6" class="text-center">Loading customers...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/admin/users.js"></script>
</body>
</html>
