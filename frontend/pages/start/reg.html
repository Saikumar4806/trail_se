<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register for the Subscription Delivery System" />
  <title>Register — Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/start/reg.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>

<body>

  <div class="form-card">
    <h1>Create Account</h1>
    <p class="subtitle">Join the Subscription Delivery System</p>

    <!-- Status message area -->
    <div id="statusMessage" class="status-msg" role="alert" aria-live="polite"></div>

    <form id="registerForm" novalidate>

      <!-- Name -->
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name" />
        <span class="err" id="nameError"></span>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        <span class="err" id="emailError"></span>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Min 6 characters" required
            autocomplete="new-password" />
          <button type="button" class="password-toggle-btn" data-target="password" aria-label="Show password" title="Show/Hide Password">👁</button>
        </div>
        <span class="err" id="passwordError"></span>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required
            autocomplete="new-password" />
          <button type="button" class="password-toggle-btn" data-target="confirmPassword" aria-label="Show confirm password" title="Show/Hide Password">👁</button>
        </div>
        <span class="err" id="confirmPasswordError"></span>
      </div>

      <!-- Phone -->
      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="9876543210" required autocomplete="tel" />
        <span class="err" id="phoneError"></span>
      </div>

      <!-- Role -->
      <div class="field">
        <label for="role">Select Your Role</label>
        <select id="role" name="role" required>
          <option value="" disabled selected>Choose a role</option>
          <option value="customer">Customer</option>
          <option value="delivery_partner">Delivery Partner</option>
        </select>
        <span class="err" id="roleError"></span>
      </div>

      <button type="submit" id="submitBtn">Register</button>
    </form>

    <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
    <p class="login-link" style="margin-top: 20px;"><a href="home.html" style="color: #7f8c8d; text-decoration: none;">&larr; Back to Home</a></p>
  </div>

  <script src="../../assets/js/start/reg.js"></script>
</body>

</html>
