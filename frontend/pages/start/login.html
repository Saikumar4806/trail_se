<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to the Subscription Delivery System" />
  <title>Login — Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/start/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>

<body>

  <div class="form-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <!-- Status message area -->
    <div id="statusMessage" class="status-msg" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="field">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com" 
          required 
          autocomplete="email"
        />
        <span class="err" id="emailError"></span>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required 
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle-btn" data-target="password" aria-label="Show password" title="Show/Hide Password">👁</button>
        </div>
        <span class="err" id="passwordError"></span>
      </div>

      <button type="submit" id="submitBtn">Sign In</button>
    </form>

    <p class="register-link">Don't have an account? <a href="reg.html">Create one</a></p>
    <p class="register-link" style="margin-top: 20px;"><a href="home.html" style="color: #7f8c8d; text-decoration: none;">&larr; Back to Home</a></p>
  </div>

  <script src="../../assets/js/start/login.js"></script>
</body>

</html>
