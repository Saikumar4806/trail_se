<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Profile - Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/Customer/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/Customer/manage_user.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <div class="navbar">
    <h2>Manage Profile</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="account-settings-section">
      <form id="profileForm" class="profile-form">
        <div class="form-group">
          <label for="profileName">Full Name</label>
          <input type="text" id="profileName" name="name" placeholder="Enter your name" required>
          <span class="error-msg" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="profileEmail">Email Address</label>
          <input type="email" id="profileEmail" name="email" placeholder="Enter your email" required>
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="profilePhone">Phone Number</label>
          <input type="tel" id="profilePhone" name="phone" placeholder="Enter your phone number" required>
          <span class="error-msg" id="phoneError"></span>
        </div>

        <div class="form-divider"></div>

        <div class="password-section">
          <h5>Change Password</h5>
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password">
            <span class="error-msg" id="currentPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password">
            <span class="error-msg" id="newPasswordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmNewPassword">Confirm Password</label>
            <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm new password">
            <span class="error-msg" id="confirmPasswordError"></span>
          </div>
        </div>

        <div class="profile-actions">
          <button type="submit" class="btn-primary">Save Changes</button>
          <button type="reset" class="btn-secondary">Cancel</button>
        </div>
        <div id="profileMessage" class="status-message"></div>
      </form>
    </div>
  </div>

  <script src="../../assets/js/customer/manage_user.js"></script>
  <script>
    // Back button handler
    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "./dashboard.html";
    });

    // Logout handler
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("user");
      localStorage.removeItem("token");
      window.location.href = "../start/login.html";
    });
  </script>
</body>
</html>
