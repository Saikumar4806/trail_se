<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Location - Subscription Delivery System</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <link rel="stylesheet" href="../../assets/css/Customer/map.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <!-- Header -->
  <div class="map-header">
    <h1><span class="map-header-icon">📍</span> Select Delivery Location</h1>
  </div>

  <!-- Coordinate Display Bar -->
  <div class="coord-bar">
    <div class="coord-item">
      <span class="coord-label">Lat:</span>
      <span class="coord-value" id="latDisplay">—</span>
    </div>
    <div class="coord-item">
      <span class="coord-label">Lng:</span>
      <span class="coord-value" id="lngDisplay">—</span>
    </div>
    <div class="manual-coord-inputs">
      <input type="number" id="latInput" class="coord-input" step="any" placeholder="Enter latitude">
      <input type="number" id="lngInput" class="coord-input" step="any" placeholder="Enter longitude">
      <button class="set-point-btn" id="setPointBtn" type="button">Set Point</button>
    </div>
    <button class="locate-btn" id="locateMeBtn" type="button">
      📡 My Location
    </button>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Toast notification -->
  <div class="map-toast" id="mapToast"></div>

  <!-- Actions -->
  <div class="map-actions">
    <button class="map-action-btn map-cancel-btn" id="cancelMapBtn" type="button">Cancel</button>
    <button class="map-action-btn map-save-btn" id="saveLocationBtn" type="button">✓ Save Location</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="../../assets/js/customer/map.js"></script>

</body>
</html>
