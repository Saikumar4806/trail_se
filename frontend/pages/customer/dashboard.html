<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/Customer/dashboard.css">
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Customer Dashboard</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn" onclick="history.back()">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Action Section -->
    <div class="action-section">
      <div class="action-buttons">
        <button class="add-subscription-btn" id="addSubscriptionBtn">+ Add Subscription</button>
      </div>
    </div>

    <!-- Subscriptions Section -->
    <div class="subscriptions-section">
      <div class="subscriptions-header">
        <h3>Your Subscriptions</h3>
        <div class="pause-deadline-card" id="pauseDeadlineCard" aria-live="polite">
          <span class="pause-deadline-label">Pause Tomorrow's Order In</span>
          <span class="pause-deadline-time" id="pauseDeadlineTime">--:--:--</span>
        </div>
      </div>
      <div class="subscriptions-list" id="subscriptionsContainer"></div>
    </div>

    <!-- Account Settings Section -->
    <div class="account-settings-section">
      <h3>Account Settings</h3>
      <div class="settings-buttons-container">
        <button class="settings-btn" onclick="window.location.href='./manage_user.html'">Manage Profile</button>
        <button class="settings-btn" onclick="window.location.href='./manage_addresses.html'">Manage Addresses</button>
        <button class="order-history-btn" onclick="window.location.href='./orders.html'">Order History</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/customer/dashboard.js"></script>
</body>
</html>
