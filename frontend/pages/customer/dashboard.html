<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/Customer/dashboard.css">
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Customer Dashboard</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn" onclick="history.back()">Back</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Add Subscription Section -->
    <div class="action-section">
      <button class="add-subscription-btn" id="addSubscriptionBtn">+ Add Subscription</button>
    </div>

    <!-- Subscriptions Section -->
    <div class="subscriptions-section">
      <h3>Your Subscriptions</h3>
      <div class="subscriptions-list" id="subscriptionsContainer"></div>
    </div>
  </div>

  <script src="../../assets/js/customer/dashboard.js"></script>
</body>
</html>
