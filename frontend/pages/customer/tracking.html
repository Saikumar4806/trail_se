<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Delivery - Subscription Delivery System</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <link rel="stylesheet" href="../../assets/css/Customer/tracking.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Track Delivery</h2>
    <div class="nav-buttons">
      <button class="back-btn" onclick="window.location.href='./dashboard.html'">← Back to Dashboard</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Info Panel -->
    <div class="tracking-info-panel" id="infoPanel">
      <div class="info-header">
        <h3>📦 Delivery Tracking</h3>
        <span class="tracking-status" id="trackingStatus">Loading...</span>
      </div>
      <div class="info-details" id="infoDetails">
        <div class="info-row">
          <span class="info-label">Order:</span>
          <span class="info-value" id="orderIdDisplay">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Delivery Address:</span>
          <span class="info-value" id="addressDisplay">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Amount:</span>
          <span class="info-value" id="amountDisplay">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Slot:</span>
          <span class="info-value" id="slotDisplay">—</span>
        </div>
      </div>

    </div>

    <!-- Map Section -->
    <div class="map-section">
      <div id="map"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="../../assets/js/customer/tracking.js"></script>

</body>
</html>
