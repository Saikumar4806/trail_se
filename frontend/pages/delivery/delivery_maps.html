<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Route Map - Subscription Delivery System</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <link rel="stylesheet" href="../../assets/css/DeliveryPartner/delivery_maps.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Delivery Route</h2>
    <div class="nav-buttons">
      <button class="back-btn" id="backBtn">Back to Dashboard</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Route Controls -->
    <div class="route-controls">
      <div class="control-group">
        <label for="routeDate">Date:</label>
        <input type="date" id="routeDate">
      </div>
      <div class="control-group">
        <label for="routeSlot">Slot:</label>
        <select id="routeSlot">
          <option value="morning">🌅 Morning</option>
          <option value="evening">🌆 Evening</option>
        </select>
      </div>
      <button class="set-location-btn" id="setLocationBtn" type="button">📡 Set My Location</button>
      <button class="load-route-btn" id="loadRouteBtn" type="button">📍 Load My Route</button>
    </div>

    <!-- Map Section -->
    <div class="map-section">
      <div class="map-header">
        <h3>📍 Live Delivery Map</h3>
        <span class="map-status" id="mapStatus">No Route Loaded</span>
      </div>

      <!-- Demo Controls (shown after route is loaded) -->
      <div class="demo-controls" id="demoControls" style="display:none;">
        <button class="demo-btn" id="demoBtn" disabled>🚀 Start Demo</button>
        <div class="progress-bar-container" id="progressContainer" style="display:none;">
          <div class="progress-bar" id="progressBar"></div>
          <span class="progress-text" id="progressText">0%</span>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <!-- Deliveries Table Section -->
    <div class="deliveries-section">
      <div class="section-header">
        <h3>🚚 Assigned Deliveries</h3>
        <div class="filter-controls">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="out_for_delivery">Pending</button>
          <button class="filter-btn" data-filter="delivered">Delivered</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="deliveries-table">
          <thead>
            <tr>
              <th>Stop #</th>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Address</th>
              <th>Slot</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="deliveriesTableBody">
            <tr>
              <td colspan="8" class="no-data">Select a date and slot, then click "Load My Route"</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Summary Section -->
      <div class="summary-section">
        <div class="summary-item">
          <span class="summary-label">Total Deliveries:</span>
          <span class="summary-value" id="totalCount">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Completed:</span>
          <span class="summary-value completed" id="completedCount">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Pending:</span>
          <span class="summary-value pending" id="pendingCount">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Total Amount:</span>
          <span class="summary-value" id="totalAmount">₹0.00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="../../assets/js/delivery/delivery_maps.js"></script>

</body>
</html>
