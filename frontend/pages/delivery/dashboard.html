<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Partner Dashboard - Subscription Delivery System</title>
  <link rel="stylesheet" href="../../assets/css/DeliveryPartner/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../assets/js/shared/alerts.js"></script>
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Delivery Partner Dashboard</h2>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="window.location.href='history.html'">Delivery History</button>
      <button class="nav-btn" onclick="window.location.href='profile.html'">Manage Profile</button>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Key Metrics -->
    <div class="metrics-section">
      <div class="metric-card">
        <div class="metric-label">Today's Orders</div>
        <div class="metric-value" id="todayOrders">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Completed</div>
        <div class="metric-value" id="completedOrders">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Today's Earnings</div>
        <div class="metric-value" id="todayEarnings">₹0.00</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total Earnings</div>
        <div class="metric-value" id="totalEarnings">₹0.00</div>
      </div>
    </div>

    <!-- Start Delivery Button -->
    <div class="start-delivery-section">
      <button class="start-delivery-btn" id="startDeliveryBtn">Start Delivery</button>
    </div>

    <!-- Orders List -->
    <div class="orders-section">
      <div class="section-header">
        <h3>Today's Delivery Orders</h3>
        <span class="order-count">Total: <strong id="totalOrderCount">0</strong></span>
      </div>

      <div class="orders-container" id="ordersContainer">
        <div class="no-orders">No orders assigned for today</div>
      </div>
    </div>
  </div>

  <script src="../../assets/js/delivery/dashboard.js"></script>
</body>
</html>
