<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Profile - Delivery Partner</title>
  <link rel="stylesheet" href="../../assets/css/DeliveryPartner/dashboard.css">
  <style>
    .profile-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      border: 1px solid #d1d8e0;
      max-width: 600px;
      margin: 40px auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #34495e;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d8e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 44px;
    }
    .password-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      color: #666;
      padding: 2px;
    }
    .error-msg {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 6px;
      display: none;
      font-weight: 600;
    }
    .error-msg.show {
      display: block;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      justify-content: flex-start;
    }
    /* Buttons — match Customer manage_user.html */
    .btn-primary,
    .btn-secondary {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex: 0 0 auto;
    }

    /* Slightly smaller primary button for this page */
    .btn-group .btn-primary {
      padding: 10px 18px;
      font-size: 12px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #e0e0e0;
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
      transform: translateY(-2px);
    }

    /* Keep existing back button style for navbar/back links */
    .back-btn {
      background: #34495e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      flex: 1;
    }
    .status-message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .status-message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>Manage Profile</h2>
    <div class="nav-buttons">
      <a href="dashboard.html" class="back-btn">Back to Dashboard</a>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="profile-card">
      <div id="statusMessage" class="status-message"></div>
      
      <form id="profileForm">
        <div class="form-group">
          <label for="profileName">Full Name</label>
          <input type="text" id="profileName" required>
          <span class="error-msg" id="nameError"></span>
        </div>
        <div class="form-group">
          <label for="profileEmail">Email Address</label>
          <input type="email" id="profileEmail" required>
          <span class="error-msg" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="profilePhone">Phone Number</label>
          <input type="tel" id="profilePhone" required>
          <span class="error-msg" id="phoneError"></span>
        </div>
        
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <h4>Change Password (Optional)</h4>
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <div class="password-wrap">
            <input type="password" id="currentPassword">
            <button type="button" class="password-toggle-btn" data-target="currentPassword" aria-label="Show current password" title="Show/Hide Password">👁</button>
          </div>
          <span class="error-msg" id="currentPasswordError"></span>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-wrap">
            <input type="password" id="newPassword">
            <button type="button" class="password-toggle-btn" data-target="newPassword" aria-label="Show new password" title="Show/Hide Password">👁</button>
          </div>
          <span class="error-msg" id="newPasswordError"></span>
        </div>
        
        <div class="btn-group">
          <button type="submit" class="btn-primary" id="saveBtn">Save Changes</button>
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../assets/js/delivery/profile.js"></script>
</body>
</html>
