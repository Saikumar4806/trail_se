<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Profile - Delivery Partner</title>
  <link rel="stylesheet" href="../../assets/css/DeliveryPartner/dashboard.css">
  <style>
    .profile-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      border: 1px solid #d1d8e0;
      max-width: 600px;
      margin: 40px auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #34495e;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d8e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    .save-btn {
      background: #2ecc71;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
    }
    .back-btn {
      background: #34495e;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      flex: 1;
    }
    .status-message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .status-message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>Manage Profile</h2>
    <div class="nav-buttons">
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="profile-card">
      <div id="statusMessage" class="status-message"></div>
      
      <form id="profileForm">
        <div class="form-group">
          <label for="profileName">Full Name</label>
          <input type="text" id="profileName" required>
        </div>
        <div class="form-group">
          <label for="profileEmail">Email Address</label>
          <input type="email" id="profileEmail" required>
        </div>
        <div class="form-group">
          <label for="profilePhone">Phone Number</label>
          <input type="tel" id="profilePhone" required>
        </div>
        
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
        
        <h4>Change Password (Optional)</h4>
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input type="password" id="currentPassword">
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword">
        </div>
        
        <div class="btn-group">
          <a href="dashboard.html" class="back-btn">Back to Dashboard</a>
          <button type="submit" class="save-btn" id="saveBtn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../assets/js/delivery/profile.js"></script>
</body>
</html>
